spring.jpa.hibernate.ddl-auto=update
spring.datasource.url=jdbc:mysql://${MYSQL_HOST:localhost}:3306/laptopshop
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
logging.level.org.hibernate=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.orm.jdbc.bind=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN

# config view engine
# spring.mvc.view.prefix=/WEB_INF/view/
# spring.mvc.view.suffix=.jsp
#default 1MB
spring.servlet.multipart.max-file-size = 50MB

#default 10MB (form data)
spring.servlet.multipart.max-request-size = 50MB

logging.level.org.springframework.security=INFO

# spring session
spring.session.store-type=jdbc
spring.session.timeout=30m
spring.session.jdbc.initialize-schema=always

# OpenAI integration for AI chat. Set OPENAI_API_KEY in the environment to enable real AI responses.
openai.api-key=${OPENAI_API_KEY:}
openai.model=${OPENAI_MODEL:gpt-4.1}

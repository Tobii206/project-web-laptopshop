  <text x="975" y="525" class="item">3.4 Xem va xac nhan gio hang</text>

  <rect x="1370" y="290" rx="20" ry="20" width="360" height="310" class="moduleD" />
  <text x="1550" y="335" text-anchor="middle" class="boxTitle">4. QUAN LY DON HANG</text>
  <text x="1405" y="390" class="item">4.1 Checkout va tao don hang</text>
  <text x="1405" y="435" class="item">4.2 Luu chi tiet don hang</text>
  <text x="1405" y="480" class="item">4.3 Tru ton kho sau khi mua</text>
  <text x="1405" y="525" class="item">4.4 Xem lich su mua hang</text>
  <text x="1405" y="570" class="item">4.5 Loc don theo thoi gian</text>

  <path d="M680 600 L680 680" class="line" />
  <path d="M680 680 L1120 680" class="line" />
  <path d="M1120 600 L1120 680" class="line" />
  <path d="M680 680 L680 720" class="line" />
  <path d="M1120 680 L1120 720" class="line" />

  <rect x="500" y="720" rx="20" ry="20" width="360" height="280" class="moduleE" />
  <text x="680" y="765" text-anchor="middle" class="boxTitle">5. QUAN TRI ADMIN</text>
  <text x="535" y="820" class="item">5.1 Quan ly user</text>
  <text x="535" y="865" class="item">5.2 Quan ly product</text>
  <text x="535" y="910" class="item">5.3 Quan ly order</text>
  <text x="535" y="955" class="item">5.4 Dashboard tong quan</text>

  <rect x="940" y="720" rx="20" ry="20" width="360" height="280" class="moduleF" />
  <text x="1120" y="765" text-anchor="middle" class="boxTitle">6. THONG KE</text>
  <text x="975" y="820" class="item">6.1 Thong ke theo ngay</text>
  <text x="975" y="865" class="item">6.2 Thong ke theo thang</text>
  <text x="975" y="910" class="item">6.3 Thong ke theo nam</text>
  <text x="975" y="955" class="item">6.4 Bieu do doanh thu / ton kho</text>
</svg>
